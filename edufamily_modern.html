<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFamily - Assistant Familial</title>
    
    <!-- Google Fonts - Vintage & Elegant -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #F5F1E8;
            --taupe: #9B8B7E;
            --terracotta: #C9ADA1;
            --sage: #A8DADC;
            --rose-gold: #D4A5A5;
            --dark: #4A4A4A;
            --shadow: rgba(155, 139, 126, 0.15);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Crimson Text', serif;
            background: linear-gradient(135deg, var(--cream) 0%, #FAF8F3 100%);
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Decorative background texture */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, var(--rose-gold) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, var(--sage) 0%, transparent 50%);
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, var(--taupe) 0%, var(--terracotta) 100%);
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px var(--shadow);
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 40%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--cream);
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: fadeInDown 1s ease-out;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .tagline {
            font-size: 1.3rem;
            color: var(--cream);
            opacity: 0.95;
            letter-spacing: 1px;
            animation: fadeIn 1.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Navigation Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            flex-wrap: wrap;
        }
        
        .tab {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            padding: 1rem 2.5rem;
            background: white;
            border: 2px solid var(--taupe);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px var(--shadow);
            position: relative;
            overflow: hidden;
        }
        
        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transition: left 0.5s;
        }
        
        .tab:hover::before {
            left: 100%;
        }
        
        .tab:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow);
            border-color: var(--rose-gold);
        }
        
        .tab.active {
            background: linear-gradient(135deg, var(--taupe) 0%, var(--terracotta) 100%);
            color: white;
            border-color: var(--taupe);
            box-shadow: 0 8px 30px var(--shadow);
        }
        
        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .tab-content {
            display: none;
            animation: slideUp 0.6s ease-out;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Cards */
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px var(--shadow);
            border: 1px solid rgba(155, 139, 126, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .section-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px var(--shadow);
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--taupe);
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--terracotta);
            letter-spacing: 1px;
        }
        
        /* Form Styling */
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.8s ease-out;
            animation-fill-mode: both;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        
        label {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--taupe);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 1rem 1.5rem;
            font-family: 'Crimson Text', serif;
            font-size: 1.1rem;
            border: 2px solid var(--terracotta);
            border-radius: 12px;
            background: var(--cream);
            color: var(--dark);
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--rose-gold);
            background: white;
            box-shadow: 0 5px 20px var(--shadow);
            transform: translateY(-2px);
        }
        
        /* Buttons */
        .btn {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 20px var(--shadow);
            font-weight: 600;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--taupe) 0%, var(--terracotta) 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px var(--shadow);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--sage) 0%, var(--rose-gold) 100%);
            color: white;
        }
        
        .btn-delete {
            background: linear-gradient(135deg, #E07A5F 0%, #C9536D 100%);
            color: white;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
        }
        
        /* Items List */
        .items-list {
            margin-top: 2rem;
        }
        
        .item {
            background: linear-gradient(135deg, white 0%, var(--cream) 100%);
            border-left: 4px solid var(--rose-gold);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow);
            cursor: move;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .item:hover {
            transform: translateX(10px);
            box-shadow: 0 8px 25px var(--shadow);
        }
        
        .item.dragging {
            opacity: 0.5;
            transform: rotate(2deg);
        }
        
        .item h3 {
            font-family: 'Playfair Display', serif;
            color: var(--taupe);
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }
        
        .item p {
            font-size: 1.1rem;
            color: var(--dark);
            margin: 0.3rem 0;
            line-height: 1.6;
        }
        
        .item-actions {
            margin-top: 1rem;
            text-align: right;
        }
        
        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, white 0%, var(--cream) 100%);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 30px var(--shadow);
            border: 2px solid var(--terracotta);
            transition: all 0.4s ease;
            animation: fadeIn 1s ease-out;
            animation-fill-mode: both;
        }
        
        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        
        .stat-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 50px var(--shadow);
        }
        
        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--taupe), var(--rose-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            font-size: 1.2rem;
            color: var(--taupe);
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--taupe);
            font-size: 1.2rem;
            opacity: 0.7;
        }
        
        .empty-state::before {
            content: '✨';
            display: block;
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .tabs {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .tab {
                width: 100%;
            }
            
            .section-card {
                padding: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Loading animation */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
    </style>
</head>
<body>
    <header>
        <h1>EduFamily</h1>
        <p class="tagline">Votre assistant familial moderne</p>
    </header>
    
    <div class="tabs">
        <button class="tab active" data-tab="activites">👶 Activités Enfants</button>
        <button class="tab" data-tab="engagements">👨‍👩‍👧 Engagements</button>
        <button class="tab" data-tab="factures">💰 Factures</button>
        <button class="tab" data-tab="dashboard">📊 Tableau de bord</button>
    </div>
    
    <div class="container">
        <!-- Activités Enfants -->
        <div class="tab-content active" id="activites">
            <div class="section-card">
                <h2>Ajouter une Activité</h2>
                <form id="activite-form">
                    <div class="form-group">
                        <label for="enfant-nom">Nom de l'enfant</label>
                        <input type="text" id="enfant-nom" required>
                    </div>
                    <div class="form-group">
                        <label for="enfant-activite">Activité</label>
                        <input type="text" id="enfant-activite" required>
                    </div>
                    <div class="form-group">
                        <label for="enfant-date">Date et heure</label>
                        <input type="text" id="enfant-date" required>
                    </div>
                    <div class="form-group">
                        <label for="enfant-notes">Notes</label>
                        <textarea id="enfant-notes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">✨ Ajouter l'Activité</button>
                </form>
            </div>
            
            <div class="section-card">
                <h2>Activités Programmées</h2>
                <div class="items-list" id="activites-list"></div>
            </div>
        </div>
        
        <!-- Engagements -->
        <div class="tab-content" id="engagements">
            <div class="section-card">
                <h2>Ajouter un Engagement</h2>
                <form id="engagement-form">
                    <div class="form-group">
                        <label for="engagement-titre">Titre</label>
                        <input type="text" id="engagement-titre" required>
                    </div>
                    <div class="form-group">
                        <label for="engagement-avec">Avec</label>
                        <input type="text" id="engagement-avec" required>
                    </div>
                    <div class="form-group">
                        <label for="engagement-date">Date et heure</label>
                        <input type="text" id="engagement-date" required>
                    </div>
                    <div class="form-group">
                        <label for="engagement-lieu">Lieu</label>
                        <input type="text" id="engagement-lieu">
                    </div>
                    <button type="submit" class="btn btn-primary">✨ Ajouter l'Engagement</button>
                </form>
            </div>
            
            <div class="section-card">
                <h2>Engagements à Venir</h2>
                <div class="items-list" id="engagements-list"></div>
            </div>
        </div>
        
        <!-- Factures -->
        <div class="tab-content" id="factures">
            <div class="section-card">
                <h2>Ajouter une Facture</h2>
                <form id="facture-form">
                    <div class="form-group">
                        <label for="facture-desc">Description</label>
                        <input type="text" id="facture-desc" required>
                    </div>
                    <div class="form-group">
                        <label for="facture-montant">Montant (€)</label>
                        <input type="number" id="facture-montant" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="facture-date">Date d'échéance</label>
                        <input type="text" id="facture-date" required>
                    </div>
                    <div class="form-group">
                        <label for="facture-statut">Statut</label>
                        <select id="facture-statut">
                            <option>À payer</option>
                            <option>Payée</option>
                            <option>En retard</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">✨ Ajouter la Facture</button>
                </form>
            </div>
            
            <div class="section-card">
                <h2>Liste des Factures</h2>
                <div class="items-list" id="factures-list"></div>
            </div>
        </div>
        
        <!-- Dashboard -->
        <div class="tab-content" id="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="stat-activites">0</div>
                    <div class="stat-label">Activités</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-engagements">0</div>
                    <div class="stat-label">Engagements</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="stat-factures">0</div>
                    <div class="stat-label">Factures</div>
                </div>
            </div>
            
            <div class="section-card">
                <h2>Vue d'Ensemble</h2>
                <div id="dashboard-content"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Data Storage
        let data = {
            activites: [],
            engagements: [],
            factures: []
        };
        
        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem('edufamily-data');
            if (saved) {
                data = JSON.parse(saved);
            }
        }
        
        // Save data to localStorage
        function saveData() {
            localStorage.setItem('edufamily-data', JSON.stringify(data));
        }
        
        // Tab Navigation
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active class from all tabs and contents
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                // Add active class to clicked tab
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.getElementById(tabId).classList.add('active');
                
                // Refresh dashboard if clicked
                if (tabId === 'dashboard') {
                    refreshDashboard();
                }
            });
        });
        
        // Current date helper
        function getCurrentDate() {
            const now = new Date();
            return now.toLocaleDateString('fr-FR') + ' ' + 
                   now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
        }
        
        // Initialize date fields
        document.getElementById('enfant-date').value = getCurrentDate();
        document.getElementById('engagement-date').value = getCurrentDate();
        
        const futureDate = new Date();
        futureDate.setDate(futureDate.getDate() + 30);
        document.getElementById('facture-date').value = futureDate.toLocaleDateString('fr-FR');
        
        // Activités Form
        document.getElementById('activite-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const activite = {
                id: Date.now(),
                nom: document.getElementById('enfant-nom').value,
                activite: document.getElementById('enfant-activite').value,
                date: document.getElementById('enfant-date').value,
                notes: document.getElementById('enfant-notes').value
            };
            
            data.activites.push(activite);
            saveData();
            renderActivites();
            
            e.target.reset();
            document.getElementById('enfant-date').value = getCurrentDate();
            
            showSuccess('Activité ajoutée avec succès ! ✨');
        });
        
        // Engagements Form
        document.getElementById('engagement-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const engagement = {
                id: Date.now(),
                titre: document.getElementById('engagement-titre').value,
                avec: document.getElementById('engagement-avec').value,
                date: document.getElementById('engagement-date').value,
                lieu: document.getElementById('engagement-lieu').value
            };
            
            data.engagements.push(engagement);
            saveData();
            renderEngagements();
            
            e.target.reset();
            document.getElementById('engagement-date').value = getCurrentDate();
            
            showSuccess('Engagement ajouté avec succès ! ✨');
        });
        
        // Factures Form
        document.getElementById('facture-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const facture = {
                id: Date.now(),
                description: document.getElementById('facture-desc').value,
                montant: parseFloat(document.getElementById('facture-montant').value),
                date: document.getElementById('facture-date').value,
                statut: document.getElementById('facture-statut').value
            };
            
            data.factures.push(facture);
            saveData();
            renderFactures();
            
            e.target.reset();
            const futureDate = new Date();
            futureDate.setDate(futureDate.getDate() + 30);
            document.getElementById('facture-date').value = futureDate.toLocaleDateString('fr-FR');
            
            showSuccess('Facture ajoutée avec succès ! ✨');
        });
        
        // Render Activités
        function renderActivites() {
            const list = document.getElementById('activites-list');
            
            if (data.activites.length === 0) {
                list.innerHTML = '<div class="empty-state">Aucune activité programmée</div>';
                return;
            }
            
            list.innerHTML = data.activites.map(a => `
                <div class="item" draggable="true" data-id="${a.id}" data-type="activite">
                    <h3>👶 ${a.nom} - ${a.activite}</h3>
                    <p>📅 ${a.date}</p>
                    ${a.notes ? `<p>📝 ${a.notes}</p>` : ''}
                    <div class="item-actions">
                        <button class="btn btn-delete" onclick="deleteItem('activites', ${a.id})">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');
            
            addDragAndDrop();
        }
        
        // Render Engagements
        function renderEngagements() {
            const list = document.getElementById('engagements-list');
            
            if (data.engagements.length === 0) {
                list.innerHTML = '<div class="empty-state">Aucun engagement programmé</div>';
                return;
            }
            
            list.innerHTML = data.engagements.map(e => `
                <div class="item" draggable="true" data-id="${e.id}" data-type="engagement">
                    <h3>📅 ${e.titre}</h3>
                    <p>👥 Avec ${e.avec}</p>
                    <p>📅 ${e.date}</p>
                    ${e.lieu ? `<p>📍 ${e.lieu}</p>` : ''}
                    <div class="item-actions">
                        <button class="btn btn-delete" onclick="deleteItem('engagements', ${e.id})">🗑️ Supprimer</button>
                    </div>
                </div>
            `).join('');
            
            addDragAndDrop();
        }
        
        // Render Factures
        function renderFactures() {
            const list = document.getElementById('factures-list');
            
            if (data.factures.length === 0) {
                list.innerHTML = '<div class="empty-state">Aucune facture enregistrée</div>';
                return;
            }
            
            const total = data.factures
                .filter(f => f.statut !== 'Payée')
                .reduce((sum, f) => sum + f.montant, 0);
            
            const items = data.factures.map(f => {
                const emoji = f.statut === 'Payée' ? '✅' : f.statut === 'En retard' ? '⚠️' : '⏳';
                return `
                    <div class="item" draggable="true" data-id="${f.id}" data-type="facture">
                        <h3>${emoji} ${f.description}</h3>
                        <p>💰 ${f.montant.toFixed(2)} €</p>
                        <p>📅 Échéance: ${f.date}</p>
                        <p>📋 ${f.statut}</p>
                        <div class="item-actions">
                            <button class="btn btn-delete" onclick="deleteItem('factures', ${f.id})">🗑️ Supprimer</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            list.innerHTML = items + `
                <div class="item" style="background: linear-gradient(135deg, var(--rose-gold) 0%, var(--terracotta) 100%); color: white; border-left: none;">
                    <h3>💳 Total à Payer</h3>
                    <p style="color: white; font-size: 2rem; font-weight: bold;">${total.toFixed(2)} €</p>
                </div>
            `;
            
            addDragAndDrop();
        }
        
        // Delete Item
        function deleteItem(type, id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cet élément ?')) {
                data[type] = data[type].filter(item => item.id !== id);
                saveData();
                
                if (type === 'activites') renderActivites();
                if (type === 'engagements') renderEngagements();
                if (type === 'factures') renderFactures();
                
                showSuccess('Élément supprimé ! ✨');
            }
        }
        
        // Dashboard
        function refreshDashboard() {
            document.getElementById('stat-activites').textContent = data.activites.length;
            document.getElementById('stat-engagements').textContent = data.engagements.length;
            document.getElementById('stat-factures').textContent = data.factures.length;
            
            const content = document.getElementById('dashboard-content');
            const total = data.factures
                .filter(f => f.statut !== 'Payée')
                .reduce((sum, f) => sum + f.montant, 0);
            
            const enRetard = data.factures.filter(f => f.statut === 'En retard').length;
            
            content.innerHTML = `
                <div style="font-size: 1.2rem; line-height: 2;">
                    <p><strong>💰 Total à payer:</strong> ${total.toFixed(2)} €</p>
                    <p><strong>${enRetard > 0 ? '⚠️' : '✅'} Factures en retard:</strong> ${enRetard}</p>
                    
                    <h3 style="margin-top: 2rem; color: var(--taupe); font-family: 'Playfair Display', serif;">Prochaines Activités</h3>
                    ${data.activites.slice(0, 3).map(a => `
                        <p>• ${a.nom} - ${a.activite} (${a.date})</p>
                    `).join('') || '<p>Aucune activité</p>'}
                    
                    <h3 style="margin-top: 2rem; color: var(--taupe); font-family: 'Playfair Display', serif;">Prochains Engagements</h3>
                    ${data.engagements.slice(0, 3).map(e => `
                        <p>• ${e.titre} avec ${e.avec} (${e.date})</p>
                    `).join('') || '<p>Aucun engagement</p>'}
                </div>
            `;
        }
        
        // Drag and Drop
        function addDragAndDrop() {
            const items = document.querySelectorAll('.item[draggable="true"]');
            
            items.forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                });
                
                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const dragging = document.querySelector('.dragging');
                    const afterElement = getDragAfterElement(item.parentElement, e.clientY);
                    
                    if (afterElement == null) {
                        item.parentElement.appendChild(dragging);
                    } else {
                        item.parentElement.insertBefore(dragging, afterElement);
                    }
                });
            });
        }
        
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.item:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }
        
        // Success notification
        function showSuccess(message) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, var(--sage), var(--rose-gold));
                color: white;
                padding: 1.5rem 2rem;
                border-radius: 15px;
                box-shadow: 0 10px 40px var(--shadow);
                z-index: 1000;
                font-family: 'Playfair Display', serif;
                font-size: 1.1rem;
                animation: slideIn 0.5s ease-out;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'fadeOut 0.5s ease-out';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }
        
        // Initialize
        loadData();
        renderActivites();
        renderEngagements();
        renderFactures();
        refreshDashboard();
    </script>
</body>
</html>
